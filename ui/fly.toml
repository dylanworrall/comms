app = "comms-web"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    NEXT_PUBLIC_COMMS_MANAGED = "true"
    NEXT_PUBLIC_CONVEX_URL = "https://blessed-tern-353.convex.cloud"
    NEXT_PUBLIC_CONVEX_SITE_URL = "https://blessed-tern-353.convex.site"

[http_service]
  internal_port = 3000
  force_https = true

[env]
  NODE_ENV = "production"
  NEXT_PUBLIC_APP_URL = "https://comms.soshi.dev"
  NEXT_PUBLIC_CONVEX_URL = "https://blessed-tern-353.convex.cloud"
  NEXT_PUBLIC_CONVEX_SITE_URL = "https://blessed-tern-353.convex.site"
  VOICE_WS_HOST = "voice.soshi.dev"
